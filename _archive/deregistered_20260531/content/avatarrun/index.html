<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아바타 런 · Sand Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #EDEBE4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100vh;
            font-family: 'JetBrains Mono', monospace;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #fff;
            border-bottom: 1px solid #E0DDD6;
            flex-shrink: 0;
            height: 44px;
        }
        .header-logo {
            font-size: 13px;
            font-weight: 700;
            color: #1A1A18;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-logo span {
            font-size: 10px;
            font-weight: 400;
            color: #AAA;
        }
        .header-actions { display: flex; gap: 6px; }
        .hbtn {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 6px;
            border: .5px solid #D0CEC7;
            background: #F5F5F0;
            color: #555;
            cursor: pointer;
            font-family: inherit;
        }
        .hbtn:hover { background: #ECEAE3; }
        .hbtn.primary { background: #1A1A18; color: #fff; border-color: #1A1A18; }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
            align-items: center;
            justify-content: center;
        }

        .game-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .phone-outer {
            background: #fff;
            border-radius: 20px;
            border: 6px solid #1A1A18;
            box-shadow: 0 6px 24px rgba(0,0,0,0.18);
            overflow: hidden;
            position: relative;
        }
        .phone-canvas-wrap {
            background: #faf8f5;
            position: relative;
            display: flex;
        }
        #sand-canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #game-overlay {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .side-panel {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            align-self: flex-start;
        }
        .panel-box {
            background: #fff;
            border-radius: 8px;
            border: .5px solid #D0CEC7;
            padding: 10px 12px;
        }
        .panel-title {
            font-size: 9px;
            color: #AAA;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .state-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 2px 0;
        }
        .sk { color: #888; }
        .sv { font-weight: 700; color: #1A1A18; }

        .log-panel {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            border: .5px solid #D0CEC7;
            padding: 8px 10px;
            overflow-y: auto;
            font-size: 9px;
            line-height: 1.7;
            color: #888;
            min-height: 80px;
            max-height: 180px;
        }
        .log-ok  { color: #5A9A20; }
        .log-err { color: #C8410A; }

        /* ── 아바타 리스트 패널 ── */
        .avatar-panel {
            background: #fff;
            border-radius: 8px;
            border: .5px solid #D0CEC7;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            max-height: 220px;
        }
        .avatar-title {
            font-size: 9px;
            color: #AAA;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .avatar-list-wrap {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .avatar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            padding: 6px 8px;
            border-radius: 6px;
            border: .5px solid #D0CEC7;
            background: #F5F5F0;
            color: #333;
            cursor: pointer;
            font-family: inherit;
            font-size: 9px;
            font-weight: 700;
            text-align: left;
            transition: all 0.12s;
        }
        .avatar-btn:hover {
            transform: translateX(2px);
            border-color: #888;
            background: #ECEAE3;
        }
        .avatar-btn:active { transform: scale(0.97); }
        .avatar-btn .avatar-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            background: #8a2542;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .avatar-btn .avatar-label { flex: 1; line-height: 1.3; }
        .avatar-empty-msg {
            font-size: 9px;
            color: #AAA;
            text-align: center;
            padding: 12px 0;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">
        🦊 아바타 런 (Avatar Run)
        <span>Sand Engine v0.4</span>
    </div>
    <div class="header-actions">
        <button class="hbtn" id="btnRestart">↺ 리스타트</button>
        <button class="hbtn primary" id="btnPlay">▶ 실행</button>
    </div>
</div>

<div class="main">
    <div style="display:flex; gap:16px; align-items:flex-start; padding:16px;">

        <!-- 게임 캔버스 -->
        <div class="game-wrap">
            <div class="phone-outer">
                <div class="phone-canvas-wrap" id="phoneCanvasWrap">
                    <canvas id="sand-canvas"></canvas>
                    <canvas id="game-overlay"></canvas>
                </div>
            </div>
            <div style="font-size:9px; color:#AAA; text-align:center;">
                9193 에셋 서버와 통신하여 실시간으로 아바타 도트를 반영합니다.
            </div>
        </div>

        <!-- 사이드 패널 -->
        <div class="side-panel">
            <div class="panel-box">
                <div class="panel-title">엔진 상태</div>
                <div class="state-row"><span class="sk">FPS</span><span class="sv" id="stFps">—</span></div>
                <div class="state-row"><span class="sk">엔티티</span><span class="sv" id="stEntities">—</span></div>
                <div class="state-row"><span class="sk">현재 캐릭터</span><span class="sv" id="stChar">대기</span></div>
            </div>

            <!-- 아바타 선택 패널 -->
            <div class="avatar-panel">
                <div class="avatar-title">⚡ 실시간 아바타 API 연동</div>
                <div class="avatar-list-wrap" id="avatarListWrap">
                    <div class="avatar-empty-msg">9193 서버에서 목록을 불러오는 중...</div>
                </div>
            </div>

            <div class="log-panel" id="logPanel"></div>
        </div>
    </div>
</div>

<script type="module">
import SandEngine  from '../../engine/SandEngine.js';
import RunnerScene from './scripts/RunnerScene.js?v=1';

// ── 로그 ─────────────────────────────────────────────────────────
const logPanel = document.getElementById('logPanel');
function log(msg, cls = '') {
    const d = document.createElement('div');
    if (cls) d.className = 'log-' + cls;
    d.textContent = msg;
    logPanel.appendChild(d);
    logPanel.scrollTop = logPanel.scrollHeight;
}

// ── embed 모드 감지 (엔진 iframe 내부 여부) ────────────────────
const _isEmbed = window !== window.top;
if (_isEmbed) {
    const hdr  = document.querySelector('.header');
    const side = document.querySelector('.side-panel');
    const main = document.querySelector('.main');
    if (hdr)  hdr.style.display  = 'none';
    if (side) side.style.display = 'none';
    if (main) { main.style.padding = '0'; main.style.justifyContent = 'center'; main.style.alignItems = 'center'; }
    document.body.style.background = '#0a0a0a';
    document.body.style.overflow   = 'hidden';
}

// ── 캔버스 크기 ───────────────────────────────────────────────
const GAME_W = 480, GAME_H = 270;
const SCALE  = _isEmbed
    ? Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H)
    : Math.max(1, Math.floor(Math.min(
          (window.innerWidth  - 240) / GAME_W,
          (window.innerHeight -  44) * 0.88 / GAME_H)));

const canvas  = document.getElementById('sand-canvas');
const overlay = document.getElementById('game-overlay');
const wrap    = document.getElementById('phoneCanvasWrap');

canvas.width  = GAME_W;  canvas.height  = GAME_H;
overlay.width = GAME_W;  overlay.height = GAME_H;
canvas.style.width   = overlay.style.width   = `${GAME_W * SCALE}px`;
canvas.style.height  = overlay.style.height  = `${GAME_H * SCALE}px`;
wrap.style.width  = `${GAME_W * SCALE}px`;
wrap.style.height = `${GAME_H * SCALE}px`;

// ── 엔진 & 씬 ────────────────────────────────────────────────
const engine = new SandEngine({ canvas, gameWidth: GAME_W, gameHeight: GAME_H });
const runnerScene = new RunnerScene(overlay);
engine.scenes.register('runner', runnerScene);

// ── 헤더 버튼 ────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', () => {
    engine.start();
    log('엔진 실행', 'ok');
});
document.getElementById('btnRestart').addEventListener('click', () => {
    runnerScene._startSequence();
    log('↺ 처음부터 재시작');
});

// ── 9193 에셋 API 연동 및 캐릭터 교체 ───────────────────────
const avatarListWrap = document.getElementById('avatarListWrap');

async function loadAvatarList() {
    try {
        log('http://localhost:9193/api/data 에셋 로딩 시도...');
        const res = await fetch('http://localhost:9193/api/data');
        if (!res.ok) throw new Error('API 응답 실패');
        
        const data = await res.json();
        // 1974 에셋 브라우저의 pixels 폴더에서 픽셀 에셋 목록 파싱
        const pixelAssets = data.learningData || [];
        
        avatarListWrap.innerHTML = '';
        if (pixelAssets.length === 0) {
            avatarListWrap.innerHTML = '<div class="avatar-empty-msg">등록된 픽셀 에셋이 없습니다.</div>';
            return;
        }

        pixelAssets.forEach((asset, idx) => {
            const btn = document.createElement('button');
            btn.className = 'avatar-btn';
            
            const icon = document.createElement('span');
            icon.className = 'avatar-icon';
            icon.textContent = asset.icon || '👾';
            
            const label = document.createElement('span');
            label.className = 'avatar-label';
            label.textContent = asset.name || `아바타 ${idx + 1}`;
            
            btn.appendChild(icon);
            btn.appendChild(label);
            
            btn.addEventListener('click', () => selectAvatar(asset));
            avatarListWrap.appendChild(btn);
        });
        log(`총 ${pixelAssets.length}개의 아바타 로드 완료!`, 'ok');
    } catch (err) {
        log('서버 오프라인 (9193 포트)', 'err');
        avatarListWrap.innerHTML = '<div class="avatar-empty-msg" style="color:#C8410A">9193 서버 오프라인<br><span style="font-size:8px;color:#888">클로드 1974 프로젝트 서버를 켜주세요.</span></div>';
    }
}

// 특정 아바타 데이터 적용
async function selectAvatar(asset) {
    log(`아바타 선택: ${asset.name}`);
    document.getElementById('stChar').textContent = asset.name;
    
    // RunnerScene 내부 캐릭터 인스턴스에 외부 도트 픽셀 주입
    if (runnerScene.char) {
        runnerScene.char.applyCustomAvatar(asset);
        runnerScene._spawnPortalBurst(runnerScene.char.x + runnerScene.char.width / 2);
    }
}

// ── 상태 패널 갱신 ───────────────────────────────────────────
let _fc = 0, _ft = performance.now();
function updateStats() {
    _fc++;
    const now = performance.now();
    if (now - _ft >= 500) {
        document.getElementById('stFps').textContent =
            Math.round(_fc * 1000 / (now - _ft));
        document.getElementById('stEntities').textContent =
            engine.entities._entities.size;
        _fc = 0; _ft = now;
    }
    requestAnimationFrame(updateStats);
}

// ── 메인 ─────────────────────────────────────────────────────
async function main() {
    log('[Sand Engine] 아바타 런 로딩 중...');

    engine.input.attach();
    engine.canvas.width  = GAME_W;
    engine.canvas.height = GAME_H;

    await runnerScene.onInit(engine);
    await runnerScene.onEnter(engine);
    engine.scenes._stack.push(runnerScene);
    engine.scenes._inited.add('runner');

    log('RunnerScene 등록 완료', 'ok');
    engine.start();
    updateStats();
    
    // 서버가 켜진 상태라면 아바타 목록을 갱신
    await loadAvatarList();
}

main().catch(err => {
    console.error(err);
    log('오류: ' + err.message, 'err');
});
</script>
</body>
</html>
