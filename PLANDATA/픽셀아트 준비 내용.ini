# 1974 Pixel Tool Handoff Document
Project: 1974  
Location: C:\1974\PLANDATA\pixeltool  
Purpose: AI handoff for continuing Pixel Tool implementation

---

## 프로젝트 배경

1974 프로젝트는 대한민국 디지털 역사와 개인 성장사를 기반으로 한 HTML5 Canvas 게임이다.

챕터 1~4(챕터5 이전)까지는 실제 시대성을 반영하기 위해
**외부 이미지 리소스를 직접 게임에 사용하지 않는다.**

대신:
- 8bit / 16bit 스타일
- 코드 기반 렌더링
- JSON 데이터 기반 픽셀 출력

으로 게임을 구성한다.

즉 PNG는 최종 런타임 리소스가 아니라,
**JSON 픽셀 데이터 생성용 원본 소스** 역할만 한다.

---

# Pixel Tool 목적

Pixel Tool은 게임 내에서 사용하는:

- 캐릭터 아바타
- UI 아이콘
- 픽셀 이미지 데이터

를 PNG → JSON 으로 변환하여
게임 리소스로 저장/관리하는 내부 툴이다.

Aseprite 같은 외부 툴 대체가 아님.

직접 픽셀을 그리는 기능은 현재 불필요.

필요 기능은 오직:

1. PNG 업로드
2. 투명 배경 제거
3. 픽셀 데이터 JSON 변환
4. 파일 저장
5. 파일 목록 관리

---

# 데이터 규칙

사용자는 PNG 파일을 직접 준비한다.

규칙:
- 배경은 반드시 투명 처리
- 실제 색상 픽셀만 포함
- PNG 자체가 완성본

툴은 PNG를 수정하지 않는다.

---

## JSON 출력 포맷

```json
{
  "width": 32,
  "height": 32,
  "frames": [
    {
      "name": "frame_01",
      "pixels": [
        [10, 12, "#ff0000"],
        [11, 12, "#ff0000"],
        [12, 12, "#000000"]
      ]
    }
  ]
}