<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>더블 다운 픽셀</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; display:flex; align-items:center; justify-content:center;
            height:100vh; overflow:hidden; font-family: sans-serif; }
    canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
  </style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<script type="module">
// ── 콘솔 가로채기 및 서버 전송 ──────────────────────────────────────
const origLog = console.log;
const origWarn = console.warn;
const origError = console.error;

function sendToServer(level, args) {
    const message = args.map(arg => {
        if (typeof arg === 'object') {
            try { return JSON.stringify(arg); } catch(e) { return String(arg); }
        }
        return String(arg);
    }).join(' ');
    fetch('/api/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ level, message })
    }).catch(err => {});
}

console.log = (...args) => {
    origLog.apply(console, args);
    sendToServer('LOG', args);
};
console.warn = (...args) => {
    origWarn.apply(console, args);
    sendToServer('WARN', args);
};
console.error = (...args) => {
    origError.apply(console, args);
    sendToServer('ERROR', args);
};
window.addEventListener('error', (e) => {
    sendToServer('UNHANDLED', [e.message, e.filename, e.lineno]);
});

import SandEngine from '../../engine/SandEngine.js';
import { BoardCore } from './scripts/BoardCore.js';
import { BoardRenderer } from './scripts/BoardRenderer.js';
import { PlayScene } from './scripts/PlayScene.js';

// ── 채널 API ────────────────────────────────────────────────
const isEmbed = window !== window.top;

const game = {
    _engine: null,
    _core: null,
    _renderer: null,
    _paused: false,
    start()  { this._engine?.start(); },
    pause()  { this._engine?.stop();  this._paused = true; },
    resume() { if (this._paused) { this._engine?.start(); this._paused = false; } },
    complete(result) {
        if (isEmbed) window.parent.postMessage({ type: 'complete', result }, '*');
    },
    score(value) {
        if (isEmbed) window.parent.postMessage({ type: 'score', value }, '*');
    },
    exit() {
        if (isEmbed) window.parent.postMessage({ type: 'exit' }, '*');
    },
};
window._game = game;

window.addEventListener('message', (e) => {
    if (!e.data?.type) return;
    if (e.data.type === 'start')  game.start();
    if (e.data.type === 'pause')  game.pause();
    if (e.data.type === 'resume') game.resume();
});

// ── 초기화 ──────────────────────────────────────────────────
async function init() {
    const canvas = document.getElementById('game-canvas');
    
    // game.json 로드
    const gj = await fetch('./game.json', { cache: 'no-store' }).then(r => r.json());
    const { width, height } = gj.resolution;
    
    game._engine = new SandEngine({ canvas, gameWidth: width, gameHeight: height });
    await game._engine.init();
    
    if (gj.palette) {
        await game._engine.loadPalette('./' + gj.palette);
    }
    
    // BoardCore 및 BoardRenderer 결합
    game._core = new BoardCore();
    game._renderer = new BoardRenderer(game._engine, game._core);
    
    // PlayScene 씬 등록 & 전환
    game._engine.scenes.register('play', new PlayScene(game));
    game._engine.scenes.change('play');
    
    game.start();
    
    // 준비 완료 알림
    if (isEmbed) window.parent.postMessage({ type: 'ready' }, '*');
}

init().catch(e => console.error('[doubledown_pixel]', e));
</script>
</body>
</html>
