<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>누리 / NURI</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; display:flex; align-items:center; justify-content:center;
           height:100vh; overflow:hidden; }
    canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; background:#000; }

    #ui { position:fixed; inset:0; pointer-events:none; z-index:10;
          font-family:system-ui,-apple-system,sans-serif; -webkit-user-select:none; user-select:none; touch-action:none; }
    #ui button { pointer-events:auto; -webkit-tap-highlight-color:transparent; touch-action:none;
                 border:1px solid rgba(255,255,255,.25); background:rgba(20,22,28,.55); color:#e8e8ec;
                 border-radius:10px; font-size:13px; cursor:pointer; backdrop-filter:blur(2px); }
    #ui button:active { background:rgba(80,90,110,.8); }
    #ui button.on { background:#3b6ea5; border-color:#7fb0e6; color:#fff; }

    #topbar { position:absolute; top:8px; left:50%; transform:translateX(-50%);
              display:flex; gap:8px; align-items:center; }
    #topbar button { padding:5px 12px; }
    #btnFs { padding:5px 10px; font-size:18px; line-height:1; }
    #btnFreeze { padding:5px 10px; }

    /* 조이스틱 */
    #joy { position:absolute; bottom:18px; left:18px;
           display:flex; gap:14px; }
    #joy .jb { width:64px; height:64px; font-size:24px; padding:0;
               border-radius:14px; font-weight:bold; letter-spacing:0; }
    #joy .jb.held { background:#3b5fa0; border-color:#7faaee;
                    box-shadow:0 0 14px rgba(80,150,255,.65); color:#fff; }

    /* 스킬(원소) 선택 바 — 하단 */
    #skills { position:absolute; bottom:92px; left:50%; transform:translateX(-50%);
              display:flex; gap:8px; }
    #skills .sk { width:48px; height:48px; padding:0; border-radius:12px;
                  font-size:13px; font-weight:bold; display:flex; flex-direction:column;
                  align-items:center; justify-content:center; line-height:1.1;
                  border-width:2px; background:rgba(20,22,28,.55); }
    #skills .sk small { font-size:8px; opacity:.75; font-weight:normal; }
    #skills .sk.on { box-shadow:0 0 12px currentColor; }
  </style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="ui">
  <div id="topbar">
    <button id="btnFs" title="전체화면">⛶</button>
    <button id="btnFreeze">⏸</button>
  </div>
  <div id="skills"></div>
  <div id="joy">
    <button id="btnL" class="jb">&#9664;</button>
    <button id="btnR" class="jb">&#9654;</button>
  </div>
</div>

<script>
  // 화면 정지/재생
  const freezeBtn = document.getElementById('btnFreeze');
  let frozen = false;
  function toggleFreeze() {
    const eng = window._game?._engine;
    if (!eng) return;
    frozen = !frozen;
    frozen ? eng.stop() : eng.start();
    freezeBtn.textContent = frozen ? '▶' : '⏸';
    freezeBtn.classList.toggle('on', frozen);
  }
  freezeBtn.addEventListener('click', toggleFreeze);
  window.addEventListener('keydown', e => { if (e.key === 'p' || e.key === 'P') toggleFreeze(); });

  // 전체화면
  document.getElementById('btnFs').addEventListener('click', () => {
    const el = document.documentElement;
    const fs = document.fullscreenElement || document.webkitFullscreenElement;
    if (!fs) (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    else     (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  });

  // ── 스킬(원소) 선택 바 — element_config.csv 기반 ──
  (async () => {
    const box = document.getElementById('skills');
    let txt;
    try { txt = await fetch('./data/element_config.csv', { cache:'no-store' }).then(r => r.text()); }
    catch { return; }
    const lines = txt.split(/\r?\n/).filter(l => l.trim() && !l.trim().startsWith('#'));
    const head = lines.shift().split(',').map(s => s.trim());
    const col = n => head.indexOf(n);
    const rows = lines.map(l => l.split(','));
    let active = null;
    function select(id, btn) {
      active = id;
      [...box.children].forEach(b => b.classList.toggle('on', b === btn));
      const ng = window._nuri;
      if (ng?.setActiveElement) ng.setActiveElement(id);
    }
    rows.forEach((cells, i) => {
      const id = cells[col('id')].trim(), sym = cells[col('symbol')].trim();
      const name = cells[col('name_ko')].trim(), color = cells[col('color')].trim();
      const b = document.createElement('button');
      b.className = 'sk'; b.style.color = color; b.style.borderColor = color;
      b.innerHTML = `${sym}<small>${name}</small>`;
      b.addEventListener('click', () => select(id, b));
      box.appendChild(b);
      if (i === 0) requestAnimationFrame(() => select(id, b)); // 기본 첫 원소
    });
    // 게임 인스턴스가 늦게 뜨면 활성 원소 재적용
    const sync = setInterval(() => {
      if (window._nuri?.setActiveElement && active) { window._nuri.setActiveElement(active); clearInterval(sync); }
    }, 300);
  })();
</script>

<script type="module" src="./main.js"></script>
</body>
</html>
