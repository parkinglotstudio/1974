<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>골목길의 하루</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; display:flex; align-items:center; justify-content:center;
            height:100vh; overflow:hidden; }
    canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; background:#000; }

    /* ── 테스트용 오버레이 UI (탭은 버튼에서만 받고 나머진 캔버스로 통과) ── */
    #ui { position:fixed; inset:0; pointer-events:none; z-index:10;
          font-family:system-ui,-apple-system,sans-serif; -webkit-user-select:none; user-select:none; touch-action:none; }
    #ui button { pointer-events:auto; -webkit-tap-highlight-color:transparent; touch-action:none;
                 border:1px solid rgba(255,255,255,.35); background:rgba(20,22,28,.62); color:#e8e8ec;
                 border-radius:10px; font-size:14px; cursor:pointer; backdrop-filter:blur(2px); }
    #ui button:active { background:rgba(80,90,110,.8); }
    #ui button.on    { background:#3b6ea5; border-color:#7fb0e6; color:#fff; }

    /* 상단 바 */
    #topbar { position:absolute; top:8px; left:50%; transform:translateX(-50%);
              display:flex; gap:14px; align-items:center; }
    #topbar .grp { display:flex; gap:4px; padding:3px; background:rgba(0,0,0,.35); border-radius:12px; }
    #topbar button { padding:6px 12px; }
    #btnFs { padding:6px 10px; font-size:18px; line-height:1; }

    /* 온스크린 컨트롤 (가로=기본, 세로=작게+반투명) */
    #pad { position:absolute; bottom:18px; left:0; right:0; display:none;
           justify-content:space-between; padding:0 20px; align-items:flex-end; }
    #pad.show { display:flex; }
    #pad .move { display:flex; gap:14px; }
    #pad .btn  { width:74px; height:74px; border-radius:50%; font-size:26px;
                 display:flex; align-items:center; justify-content:center; }
    #pad #atk  { width:92px; height:92px; font-size:18px; background:rgba(150,50,50,.6); border-color:rgba(255,140,140,.5); }
    #pad #atk:active { background:rgba(210,70,70,.85); }
    #pad .atks { display:flex; gap:10px; }
    #pad #skill  { width:92px; height:92px; font-size:18px; background:rgba(140,70,190,.6); border-color:rgba(200,150,255,.5); }
    #pad #skill:active { background:rgba(170,90,230,.85); }

    /* 세로 모드: 컨트롤 작게 + 반투명 */
    #pad.portrait { opacity:.42; bottom:12px; padding:0 14px; }
    #pad.portrait .move { gap:10px; }
    #pad.portrait .btn { width:48px; height:48px; font-size:20px; }
    #pad.portrait #atk, #pad.portrait #skill { width:60px; height:60px; font-size:13px; }
    #pad.portrait .atks { gap:8px; }
  </style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="ui">
  <div id="topbar">
    <div class="grp" id="modeGrp">
      <button data-mode="portrait">세로</button>
      <button data-mode="landscape">가로</button>
    </div>
    <div class="grp" id="charGrp">
      <button data-char="female">여</button>
      <button data-char="male">남</button>
    </div>
    <button id="btnFs" title="전체화면">⛶</button>
    <button id="btnFreeze" title="화면 정지/재생 (단축키 P)">⏸</button>
  </div>

  <div id="pad">
    <div class="move">
      <button class="btn" id="left">◀</button>
      <button class="btn" id="right">▶</button>
    </div>
    <div class="atks">
      <button id="atk">공격</button>
      <button id="skill">마법</button>
    </div>
  </div>
</div>

<script>
  // ── 상태: URL 파라미터에서 모드/캐릭터 읽기 ──
  const params = new URLSearchParams(location.search);
  const mode = params.get('scene') === 'main_portrait' ? 'portrait' : 'landscape';  // 기본=가로(mainScene)
  const char = params.get('char') === 'male' ? 'male' : 'female';

  // 활성 버튼 표시
  document.querySelectorAll('#modeGrp button').forEach(b => b.classList.toggle('on', b.dataset.mode === mode));
  document.querySelectorAll('#charGrp button').forEach(b => b.classList.toggle('on', b.dataset.char === char));
  // 컨트롤 노출: 가로=기본, 세로=작게+반투명(portrait 클래스)
  const pad = document.getElementById('pad');
  pad.classList.add('show');
  if (mode === 'portrait') pad.classList.add('portrait');

  // ── 모드/캐릭터 전환: 파라미터 세팅 후 리로드 ──
  function reloadWith(key, val) {
    const u = new URL(location.href);
    u.searchParams.set('char', char);                       // 현재 캐릭터 유지
    u.searchParams.set('scene', mode === 'portrait' ? 'main_portrait' : 'main_landscape'); // 현재 모드 유지
    u.searchParams.set(key, val);
    location.href = u.toString();
  }
  document.querySelectorAll('#modeGrp button').forEach(b =>
    b.addEventListener('click', () => reloadWith('scene', b.dataset.mode === 'portrait' ? 'main_portrait' : 'main_landscape')));
  document.querySelectorAll('#charGrp button').forEach(b =>
    b.addEventListener('click', () => reloadWith('char', b.dataset.char)));

  // ── 온스크린 컨트롤 ──
  // 이동: 합성 KeyboardEvent (엔진 InputManager window 리스너가 수신)
  function holdKey(el, key) {
    const down = (e) => { e.preventDefault(); window.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true })); el.classList.add('on'); };
    const up   = (e) => { if(e) e.preventDefault(); window.dispatchEvent(new KeyboardEvent('keyup',   { key, bubbles: true })); el.classList.remove('on'); };
    el.addEventListener('pointerdown',  down);
    el.addEventListener('pointerup',    up);
    el.addEventListener('pointerleave', up);
    el.addEventListener('pointercancel', up);
    el.addEventListener('contextmenu', e => e.preventDefault());
  }
  holdKey(document.getElementById('left'),  'ArrowLeft');
  holdKey(document.getElementById('right'), 'ArrowRight');

  // 공격: CustomEvent로 게임 모듈에 전달 (크롬 Android 모듈 스코프 격리 우회 — window.dispatchEvent는 어느 스코프에서도 수신 가능)
  // GolmokGame.onEnter에서 window.addEventListener('golmok:attack:start/end', ...) 로 수신
  const atkBtn = document.getElementById('atk');
  const fireAtk  = (e) => { e.preventDefault(); window.dispatchEvent(new CustomEvent('golmok:attack:start')); atkBtn.classList.add('on'); };
  const stopAtk  = (e) => { if(e) e.preventDefault(); window.dispatchEvent(new CustomEvent('golmok:attack:end')); atkBtn.classList.remove('on'); };
  atkBtn.addEventListener('pointerdown',  fireAtk);
  atkBtn.addEventListener('pointerup',    stopAtk);
  atkBtn.addEventListener('pointerleave', stopAtk);
  atkBtn.addEventListener('pointercancel', stopAtk);
  atkBtn.addEventListener('contextmenu', e => e.preventDefault());

  // 마법 스킬(G): CustomEvent로 게임 모듈에 전달 — GolmokGame.onEnter에서 golmok:skill:start/end 수신
  const skillBtn = document.getElementById('skill');
  const fireSkill = (e) => { e.preventDefault(); window.dispatchEvent(new CustomEvent('golmok:skill:start')); skillBtn.classList.add('on'); };
  const stopSkill = (e) => { if(e) e.preventDefault(); window.dispatchEvent(new CustomEvent('golmok:skill:end')); skillBtn.classList.remove('on'); };
  skillBtn.addEventListener('pointerdown',  fireSkill);
  skillBtn.addEventListener('pointerup',    stopSkill);
  skillBtn.addEventListener('pointerleave', stopSkill);
  skillBtn.addEventListener('pointercancel', stopSkill);
  skillBtn.addEventListener('contextmenu', e => e.preventDefault());

  // ── 화면 정지/재생 (스크린샷용 — 엔진 루프 멈춰서 마지막 프레임 고정) ──
  const freezeBtn = document.getElementById('btnFreeze');
  let frozen = false;
  function toggleFreeze() {
    const eng = window._game && window._game._engine;
    if (!eng) return;
    frozen = !frozen;
    if (frozen) { eng.stop(); freezeBtn.textContent = '▶'; freezeBtn.classList.add('on'); }
    else        { eng.start(); freezeBtn.textContent = '⏸'; freezeBtn.classList.remove('on'); }
  }
  freezeBtn.addEventListener('click', toggleFreeze);
  window.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P') toggleFreeze();
  });

  // ── 전체화면 버튼 ──
  const fsBtn = document.getElementById('btnFs');
  fsBtn.addEventListener('click', () => {
    const el = document.documentElement;
    const fs = document.fullscreenElement || document.webkitFullscreenElement;
    if (!fs) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
    }
  });
</script>

<script type="module" src="./main.js"></script>
</body>
</html>
