<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1974 — Background Prompt System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --bg2: #111116;
  --bg3: #18181f;
  --border: #2a2a35;
  --border2: #383848;
  --text: #e8e8f0;
  --text2: #8888aa;
  --text3: #555570;
  --accent: #ff6b35;
  --accent2: #c44bff;
  --teal: #00b4d8;
  --gold: #f7c948;
  --green: #39d353;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.header-sub {
  font-size: 11px;
  color: var(--text3);
  font-family: 'Space Mono', monospace;
}

/* LAYOUT */
.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: calc(100vh - 49px);
}

/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--bg2);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sidebar-section {
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}
.sidebar-label {
  font-size: 10px;
  color: var(--text3);
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0 14px 8px;
}

/* TYPE TOGGLE */
.type-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 0 14px 4px;
}
.type-btn {
  cursor: pointer;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 6px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  text-align: center;
  transition: all .15s;
  line-height: 1.4;
}
.type-btn:hover { border-color: var(--border2); color: var(--text); }
.type-btn.on { border-color: var(--accent); background: rgba(255,107,53,0.08); color: var(--accent); }
.type-icon { font-size: 14px; display: block; margin-bottom: 3px; }

/* ERA BUTTONS */
.era-list { padding: 0 8px; }
.era-btn {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  border: none;
  border-radius: 6px;
  padding: 8px 10px;
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  text-align: left;
  transition: all .12s;
  margin-bottom: 1px;
}
.era-btn:hover { background: var(--bg3); color: var(--text); }
.era-btn.on { background: var(--bg3); color: var(--text); border-left: 2px solid var(--accent); padding-left: 8px; }
.era-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent);
  opacity: 0.4;
}
.era-btn.on .era-dot { opacity: 1; }
.era-lb {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  margin-left: auto;
}
.era-btn.on .era-lb { color: var(--accent); }

/* SCENE LIST */
.scene-list { padding: 0 8px; }
.scene-btn {
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  width: 100%;
  border: none;
  border-radius: 6px;
  padding: 7px 10px;
  background: transparent;
  color: var(--text2);
  font-size: 11.5px;
  font-family: 'Noto Sans KR', sans-serif;
  text-align: left;
  transition: all .12s;
  margin-bottom: 1px;
  line-height: 1.4;
}
.scene-btn:hover { background: var(--bg3); color: var(--text); }
.scene-btn.on { background: var(--bg3); color: var(--text); }
.scene-btn.on .scene-name { color: var(--gold); }
.scene-num {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  flex-shrink: 0;
  margin-top: 1px;
  min-width: 18px;
}
.scene-btn.on .scene-num { color: var(--gold); }
.scene-name { flex: 1; }
.scene-meta { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
.badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
}
.badge-event { background: rgba(196,75,255,0.15); color: var(--accent2); }
.badge-life { background: rgba(57,211,83,0.1); color: var(--green); }
.badge-day { background: rgba(247,201,72,0.1); color: var(--gold); }
.badge-night { background: rgba(0,180,216,0.1); color: var(--teal); }
.badge-dusk { background: rgba(255,107,53,0.1); color: var(--accent); }
.badge-dawn { background: rgba(136,136,170,0.1); color: var(--text2); }

/* MAIN */
.main {
  overflow-y: auto;
  background: var(--bg);
}
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.main-inner { padding: 20px; max-width: 800px; }

/* PROMPT AREA */
.prompt-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.prompt-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.08em;
}
.prompt-title span { color: var(--gold); }

.copy-btn {
  cursor: pointer;
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 14px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,107,53,0.08); }
.copy-btn.copied { border-color: var(--green); color: var(--green); background: rgba(57,211,83,0.08); }

.prompt-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 300px;
}

/* COLOR PREVIEW */
.color-strip {
  display: flex;
  gap: 0;
  margin-bottom: 12px;
  border-radius: 8px;
  overflow: hidden;
  height: 32px;
}
.color-floor {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.color-floor-label {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.05em;
  position: relative;
  z-index: 1;
}

/* INFO BAR */
.info-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.info-chip {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  background: var(--bg2);
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: var(--text2);
}
.info-chip span { color: var(--text); font-weight: 700; }

/* EMPTY STATE */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 400px;
  color: var(--text3);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  text-align: center;
  line-height: 2;
}

/* SECTION DIVIDER */
.section-div {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.prompt-section-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}
</style>
</head>

    </div>
  </div>
</div>

// ── STATE ──
var ct='h', ce=0, cs=0;

// ── PROMPT BUILDER ──
function mkPrompt(type, sc, ch) {
  var isH = type==='h';
  var ratio = isH ? '32:9 (ultra-wide horizontal)' : '9:32 (ultra-tall vertical)';
  var nf = isH ? sc.hc.length : sc.vc.length;
  var colors = isH ? sc.hc : sc.vc;
  var floors = isH ? sc.hf : sc.vf;
  var traverse = isH ? sc.ht : sc.vt;
  var layout = isH
    ? 'Ultra-wide 32:9 format. Player moves LEFT and RIGHT across scene.\nExtremely wide — equivalent to two 16:9 images side by side.\nAll floors visible simultaneously. Parallax depth between floor levels.'
    : 'Ultra-tall 9:32 format. Player moves BOTTOM TO TOP through scene.\nExtremely tall — equivalent to two 9:16 images stacked vertically.\nAll floors stacked in one continuous image. Ground at bottom, sky at top.';

  var colorBlock = colors.map(function(c,i){return 'FLOOR '+(i+1)+': '+c;}).join('\n\n');
  var floorBlock = floors.map(function(f,i){return 'FLOOR '+(i+1)+': '+f;}).join('\n');

  return [
    '════════════════════════════════════════',
    'GAME: "1974 — From Abacus to AI"',
    'CHAPTER: '+ch.era+' | SCENE: "'+sc.n+'"',
    'TYPE: '+(sc.t==='사건'?'Historical Event':'Daily Life')+' | TIME: '+sc.tod,
    'RATIO: '+ratio+' | FLOORS: '+nf+' equal-height sections',
    '════════════════════════════════════════',
    '',
    '▌ ART DIRECTION',
    ch.era+' Korea, '+sc.tod+'. Painterly illustration, BADLAND × LIMBO × Korean cinema.',
    'Foreground = pure black silhouettes. Background = luminous, multi-color painted depth.',
    '',
    '▌ CANVAS & LAYOUT',
    layout,
    '',
    '▌ FLOOR HEIGHT RULE — CRITICAL',
    'Divide total image height into exactly '+nf+' equal sections.',
    'Every floor = exactly 1/'+nf+' of total image height.',
    'NO floor taller or shorter than any other. Hard requirement.',
    'Color zones transition gradually at floor boundaries — no hard cuts.',
    '',
    '▌ COLOR PALETTE — MULTI-COLOR COLLISION PER FLOOR',
    'Each floor contains at least 3 colors in collision — never one flat tone.',
    'Colors bleed between floors at boundaries. Warm rises from below, cold descends from above.',
    'Use complementary color clashes: orange vs teal, magenta vs acid green, gold vs indigo.',
    '',
    colorBlock,
    '',
    '▌ FLOOR STRUCTURE & PLATFORMS',
    floorBlock,
    '',
    '▌ TRAVERSAL ELEMENTS',
    traverse,
    '',
    '▌ BACKGROUND LAYER',
    'Soft-focus painted Korean urban landscape behind all platform levels.',
    'Volumetric light, atmospheric haze, bokeh blur on all distant elements.',
    'Impressionistic brushwork — all background edges soft and glowing.',
    'Each floor zone reflects its own color atmosphere.',
    '',
    '▌ FOREGROUND LAYER',
    'All platforms, structures, objects near camera = 100% pure flat black silhouette.',
    'Zero grey tones, zero texture on foreground elements. Sharp crisp edges.',
    '',
    '▌ TEXT PROHIBITION — ABSOLUTE',
    '• ZERO Korean characters (한글) anywhere — no exceptions',
    '• ZERO English letters, numbers, or roman characters',
    '• ZERO readable symbols, logos, or letter-like markings',
    '• All sign frames, boards, windows = completely blank surfaces',
    '• Any visible text anywhere = the image is wrong',
    '',
    '════════════════════════════════════════',
    'STYLE: BADLAND × LIMBO × Korean cinema',
    'Painterly illustration. NOT pixel art. Studio quality.',
    'No UI. No HUD. No text of any kind anywhere.',
    '════════════════════════════════════════'
  ].join('\n');
}

// ── COLOR STRIP ──
var FLOOR_COLORS_H = [
  ['#4a0e6e','#ff6b35','#1a6b3a'],
  ['#2b0a4a','#f7c948','#d946ef'],
  ['#0a1a2b','#e8c97a','#4b0082']
];
var FLOOR_COLORS_V = [
  ['#1a0a2e','#ff6b35','#b8ff47'],
  ['#0d2b1a','#f7c948','#d946ef'],
  ['#2b0a0a','#ff2d9e','#00b4d8'],
  ['#0a1a2b','#e8c97a','#4b0082']
];

function buildColorStrip(type, sc) {
  var strip = document.getElementById('color-strip');
  strip.innerHTML = '';
  var colors = type==='h' ? sc.hc : sc.vc;
  var palette = type==='h' ? FLOOR_COLORS_H : FLOOR_COLORS_V;
  colors.forEach(function(c, i) {
    var p = palette[i % palette.length];
    var div = document.createElement('div');
    div.className = 'color-floor';
    div.style.background = 'linear-gradient(135deg,' + p[0] + ',' + p[1] + ',' + p[2] + ')';
    div.innerHTML = '<span class="color-floor-label">F'+(i+1)+'</span>';
    strip.appendChild(div);
  });
}

// ── RENDER ──
function render() {
  if (ce < 0 || cs < 0) return;
  var ch = D[ce];
  var sc = ch.sc[cs];
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('prompt-area').style.display = 'block';

  // info bar
  var todBadge = {
    '낮':'badge-day','밤':'badge-night','석양':'badge-dusk','새벽':'badge-dawn'
  }[sc.tod] || 'badge-day';
  var typeBadge = sc.t==='사건' ? 'badge-event' : 'badge-life';
  var nf = ct==='h' ? sc.hc.length : sc.vc.length;
  var ratio = ct==='h' ? '32:9' : '9:32';
  document.getElementById('info-bar').innerHTML =
    '<div class="info-chip">챕터: <span>'+ch.lb+' '+ch.era+'</span></div>' +
    '<div class="info-chip">비율: <span>'+ratio+'</span></div>' +
    '<div class="info-chip">층수: <span>'+nf+'층</span></div>' +
    '<div class="info-chip">시간: <span>'+sc.tod+'</span></div>' +
    '<div class="info-chip">구분: <span>'+(sc.t==='사건'?'역사 사건':'일상')+'</span></div>';

  buildColorStrip(ct, sc);

  document.getElementById('prompt-title').innerHTML =
    'GPT PROMPT — <span>"'+sc.n+'"</span>';

  document.getElementById('prompt-box').textContent = mkPrompt(ct, sc, ch);
}

// ── UI BUILDERS ──
function selType(t) {
  ct = t; cs = 0;
  document.getElementById('t-h').classList.toggle('on', t==='h');
  document.getElementById('t-v').classList.toggle('on', t==='v');
  buildScenes();
  render();
}

function buildEras() {
  var list = document.getElementById('era-list');
  list.innerHTML = '';
  D.forEach(function(ch, i) {
    var btn = document.createElement('button');
    btn.className = 'era-btn' + (i===0?' on':'');
    btn.innerHTML =
      '<span class="era-dot"></span>' +
      ch.era +
      '<span class="era-lb">'+ch.lb+'</span>';
    btn.onclick = function() {
      ce = i; cs = 0;
      document.querySelectorAll('.era-btn').forEach(function(b,j){ b.classList.toggle('on',j===i); });
      buildScenes();
      render();
    };
    list.appendChild(btn);
  });
}

function buildScenes() {
  var list = document.getElementById('scene-list');
  list.innerHTML = '';
  D[ce].sc.forEach(function(sc, i) {
    var btn = document.createElement('button');
    btn.className = 'scene-btn' + (i===0?' on':'');
    var todCls = {
      '낮':'badge-day','밤':'badge-night','석양':'badge-dusk','새벽':'badge-dawn'
    }[sc.tod] || 'badge-day';
    btn.innerHTML =
      '<span class="scene-num">'+(i+1)+'</span>' +
      '<div><span class="scene-name">'+sc.n+'</span>' +
      '<div class="scene-meta">' +
        '<span class="badge '+(sc.t==='사건'?'badge-event':'badge-life')+'">'+(sc.t==='사건'?'사건':'일상')+'</span>' +
        '<span class="badge '+todCls+'">'+sc.tod+'</span>' +
      '</div></div>';
    btn.onclick = function() {
      cs = i;
      document.querySelectorAll('.scene-btn').forEach(function(b,j){ b.classList.toggle('on',j===i); });
      render();
    };
    list.appendChild(btn);
  });
}

function doCopy() {
  var text = document.getElementById('prompt-box').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = '⎘ 복사';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ── INIT ──
buildEras();
buildScenes();
render();
</script>
